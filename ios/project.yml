name: TwentyNinerNext
options:
  bundleIdPrefix: io.f7z
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
packages:
  NMP:
    path: ../Dependencies/nmp/Packages/NMP
targets:
  TwentyNinerNext:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: NMP
        product: NMP
    info:
      path: Generated-Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 29er Next
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NMPIndexerRelays:
          - wss://purplepag.es
        NMPGroupRelay: wss://nip29.f7z.io
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next
        PRODUCT_MODULE_NAME: TwentyNinerNext
        PRODUCT_NAME: TwentyNinerNext
        DEVELOPMENT_TEAM: 456SHKPP26
        TARGETED_DEVICE_FAMILY: "1"
  TwentyNinerNextProof:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: NMP
        product: NMP
    info:
      path: Generated-Proof-Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 29er Legacy Proof
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NMPIndexerRelays:
          - wss://purplepag.es
        NMPGroupRelay: wss://nip29.f7z.io
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.pre-nostrdb-proof
        PRODUCT_MODULE_NAME: TwentyNinerNextPreNostrdbProof
        PRODUCT_NAME: TwentyNinerNextPreNostrdbProof
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) NMP_DEVICE_PROOF"
        DEVELOPMENT_TEAM: 456SHKPP26
        TARGETED_DEVICE_FAMILY: "1"
  TwentyNinerNextTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: TwentyNinerNext
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.tests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 456SHKPP26
  TwentyNinerNextProofUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: TwentyNinerNextProof
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.pre-nostrdb-proof.ui-tests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 456SHKPP26
schemes:
  TwentyNinerNext:
    build:
      targets:
        TwentyNinerNext: all
        TwentyNinerNextTests: [test]
    test:
      targets:
        - TwentyNinerNextTests
  TwentyNinerNextPreNostrdbDeviceProof:
    build:
      targets:
        TwentyNinerNextProof: all
        TwentyNinerNextProofUITests: [test]
    test:
      environmentVariables:
        NMP_DEVICE_PROOF: "1"
        NMP_DEVICE_PROOF_GROUP: nmp-scale-hot-room
        NMP_DEVICE_PROOF_STORE_SIZE: "2082893824"
        NMP_DEVICE_PROOF_STORE_SHA256: a03afb760f975a98df43aaae4818b5babf2348cdbae97142e192ad854205da95
      targets:
        - TwentyNinerNextProofUITests
