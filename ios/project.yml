name: TwentyNinerNext
options:
  bundleIdPrefix: io.f7z
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
packages:
  NMP:
    path: ../Dependencies/nmp/Packages/NMP
targets:
  TwentyNinerNext:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: NMP
        product: NMP
      - package: NMP
        product: NMPContent
      - package: NMP
        product: NMPUI
    info:
      path: Generated-Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 29er Next
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NMPIndexerRelays:
          - wss://purplepag.es
        NMPGroupRelay: wss://nip29.f7z.io
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next
        PRODUCT_MODULE_NAME: TwentyNinerNext
        PRODUCT_NAME: TwentyNinerNext
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 456SHKPP26
        TARGETED_DEVICE_FAMILY: "1"
  TwentyNinerNextProof:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: NMP
        product: NMP
      - package: NMP
        product: NMPContent
      - package: NMP
        product: NMPUI
    info:
      path: Generated-Proof-Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 29er Proof
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NMPIndexerRelays:
          - wss://purplepag.es
        NMPGroupRelay: wss://nip29.f7z.io
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.proof
        PRODUCT_MODULE_NAME: TwentyNinerNextProof
        PRODUCT_NAME: TwentyNinerNextProof
        DEVELOPMENT_TEAM: 456SHKPP26
        TARGETED_DEVICE_FAMILY: "1"
  TwentyNinerNextTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: TwentyNinerNext
      - package: NMP
        product: NMPContent
      - package: NMP
        product: NMPUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.tests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 456SHKPP26
  TwentyNinerNextMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: NMP
        product: NMP
      - package: NMP
        product: NMPContent
      - package: NMP
        product: NMPUI
    info:
      path: Generated-Mac-Info.plist
      properties:
        CFBundleDisplayName: 29er Next
        LSApplicationCategoryType: public.app-category.social-networking
        NMPIndexerRelays:
          - wss://purplepag.es
        NMPGroupRelay: wss://nip29.f7z.io
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.macos
        PRODUCT_MODULE_NAME: TwentyNinerNext
        DEVELOPMENT_TEAM: 456SHKPP26
  TwentyNinerNextMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: TwentyNinerNextMac
      - package: NMP
        product: NMPContent
      - package: NMP
        product: NMPUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.macos.tests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 456SHKPP26
  TwentyNinerNextProofUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: TwentyNinerNextProof
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er.next.proof.ui-tests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 456SHKPP26
schemes:
  TwentyNinerNext:
    build:
      targets:
        TwentyNinerNext: all
        TwentyNinerNextTests: [test]
    test:
      targets:
        - TwentyNinerNextTests
  TwentyNinerNextMac:
    build:
      targets:
        TwentyNinerNextMac: all
        TwentyNinerNextMacTests: [test]
    test:
      targets:
        - TwentyNinerNextMacTests
  TwentyNinerNextDeviceProof:
    build:
      targets:
        TwentyNinerNextProof: all
        TwentyNinerNextProofUITests: [test]
    test:
      environmentVariables:
        NMP_DEVICE_PROOF: "1"
      targets:
        - TwentyNinerNextProofUITests
